name: Build IPTV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 最新版，替代旧v3

    - name: Set up JDK 17
      uses: actions/setup-java@v4  # 最新版，替代旧v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4  # 最新版，替代旧v3/v2
      with:
        name: IPTV-Release-APK
        path: app/build/outputs/apk/release/*.apk
